<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Bead grid pattern -->
  <g transform="translate(72, 60)">
    <!-- Row 1 -->
    <circle cx="46" cy="46" r="34" fill="#ef4444"/>
    <circle cx="138" cy="46" r="34" fill="#3b82f6"/>
    <circle cx="230" cy="46" r="34" fill="#22c55e"/>
    <circle cx="322" cy="46" r="34" fill="#eab308"/>
    <!-- Row 2 -->
    <circle cx="46" cy="138" r="34" fill="#3b82f6"/>
    <circle cx="138" cy="138" r="34" fill="#ffffff" opacity="0.9"/>
    <circle cx="230" cy="138" r="34" fill="#ffffff" opacity="0.9"/>
    <circle cx="322" cy="138" r="34" fill="#ef4444"/>
    <!-- Row 3 -->
    <circle cx="46" cy="230" r="34" fill="#22c55e"/>
    <circle cx="138" cy="230" r="34" fill="#ffffff" opacity="0.9"/>
    <circle cx="230" cy="230" r="34" fill="#ffffff" opacity="0.9"/>
    <circle cx="322" cy="230" r="34" fill="#a855f7"/>
    <!-- Row 4 -->
    <circle cx="46" cy="322" r="34" fill="#eab308"/>
    <circle cx="138" cy="322" r="34" fill="#a855f7"/>
    <circle cx="230" cy="322" r="34" fill="#ef4444"/>
    <circle cx="322" cy="322" r="34" fill="#3b82f6"/>
  </g>
  <text x="256" y="445" text-anchor="middle" font-size="64" fill="white" font-family="sans-serif" font-weight="bold" opacity="0.95">PERLE STUDIO</text>
</svg>
