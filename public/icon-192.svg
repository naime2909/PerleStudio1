<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Bead grid pattern -->
  <g transform="translate(32, 28)">
    <!-- Row 1 -->
    <circle cx="16" cy="16" r="12" fill="#ef4444"/>
    <circle cx="48" cy="16" r="12" fill="#3b82f6"/>
    <circle cx="80" cy="16" r="12" fill="#22c55e"/>
    <circle cx="112" cy="16" r="12" fill="#eab308"/>
    <!-- Row 2 -->
    <circle cx="16" cy="48" r="12" fill="#3b82f6"/>
    <circle cx="48" cy="48" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="80" cy="48" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="112" cy="48" r="12" fill="#ef4444"/>
    <!-- Row 3 -->
    <circle cx="16" cy="80" r="12" fill="#22c55e"/>
    <circle cx="48" cy="80" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="80" cy="80" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="112" cy="80" r="12" fill="#a855f7"/>
    <!-- Row 4 -->
    <circle cx="16" cy="112" r="12" fill="#eab308"/>
    <circle cx="48" cy="112" r="12" fill="#a855f7"/>
    <circle cx="80" cy="112" r="12" fill="#ef4444"/>
    <circle cx="112" cy="112" r="12" fill="#3b82f6"/>
  </g>
  <!-- Paintbrush accent -->
  <text x="96" y="160" text-anchor="middle" font-size="28" fill="white" font-family="sans-serif" font-weight="bold" opacity="0.95">PERLE</text>
</svg>
